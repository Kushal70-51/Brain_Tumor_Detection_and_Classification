version: '3.8'

services:
  brain-tumor-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: brain-tumor-api
    ports:
      - "5000:5000"
    volumes:
      - ./model:/app/model:ro
    environment:
      - FLASK_ENV=production
      - FLASK_DEBUG=False
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - neural-network

networks:
  neural-network:
    driver: bridge
